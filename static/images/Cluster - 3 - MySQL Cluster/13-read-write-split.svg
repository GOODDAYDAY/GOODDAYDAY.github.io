000;stroke-width:1.0;" x1="244.668" x2="440.3242" y1="197.6943" y2="197.6943"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="177.6563" x="251.668" y="193.1514">UPDATE profile SET name='Bob'</text><polygon fill="#000000" points="514,221.4932,524,225.4932,514,229.4932,518,225.4932" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="446.3242" x2="520" y1="225.4932" y2="225.4932"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="27.9961" x="453.3242" y="220.9502">Write</text><polygon fill="#000000" points="457.3242,249.292,447.3242,253.292,457.3242,257.292,453.3242,253.292" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="451.3242" x2="525" y1="253.292" y2="253.292"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="17.3379" x="463.3242" y="248.749">OK</text><polygon fill="#000000" points="255.668,277.0908,245.668,281.0908,255.668,285.0908,251.668,281.0908" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="249.668" x2="445.3242" y1="281.0908" y2="281.0908"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="48.6855" x="261.668" y="276.5479">Success!</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1.0;" width="661.6895" x="5" y="308.9902"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="666.6895" y1="308.9902" y2="308.9902"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="666.6895" y1="311.9902" y2="311.9902"/><rect fill="#FFFFFF" height="21.7988" style="stroke:#000000;stroke-width:1.0;" width="179.3691" x="246.1602" y="299.0908"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="162.0352" x="252.1602" y="314.3467">Read Operation (Stale Read)</text><polygon fill="#000000" points="434.3242,346.6885,444.3242,350.6885,434.3242,354.6885,438.3242,350.6885" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="244.668" x2="440.3242" y1="350.6885" y2="350.6885"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="129.3633" x="251.668" y="346.1455">SELECT * FROM profile</text><polygon fill="#000000" points="583.3047,374.4873,593.3047,378.4873,583.3047,382.4873,587.3047,378.4873" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="446.3242" x2="589.3047" y1="378.4873" y2="378.4873"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="118.7285" x="453.3242" y="373.9443">Read (routed to slave)</text><path d="M527,391.4873 L527,442.4873 L661,442.4873 L661,401.4873 L651,391.4873 L527,391.4873 " fill="#FFC0CB" style="stroke:#000000;stroke-width:1.0;"/><path d="M651,391.4873 L651,401.4873 L661,401.4873 L651,391.4873 " fill="#FFC0CB" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="86.0566" x="533" y="407.7432">Replication Lag!</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="113.6895" x="533" y="421.542">Slave hasn't received</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="88.0313" x="533" y="435.3408">the UPDATE yet</text><polygon fill="#000000" points="457.3242,463.6826,447.3242,467.6826,457.3242,471.6826,453.3242,467.6826" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="451.3242" x2="594.3047" y1="467.6826" y2="467.6826"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="124.9805" x="463.3242" y="463.1396">name='Alice' (old data!)</text><polygon fill="#000000" points="255.668,515.1797,245.668,519.1797,255.668,523.1797,251.668,519.1797" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="249.668" x2="445.3242" y1="519.1797" y2="519.1797"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="82.0547" x="261.668" y="514.6367">Shows old data</text><path d="M10,480.6826 L10,545.6826 L240,545.6826 L240,490.6826 L230,480.6826 L10,480.6826 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M230,480.6826 L230,490.6826 L240,490.6826 L230,480.6826 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="52.6992" x="16" y="496.9385">Solutions:</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="167.3906" x="16" y="510.7373">1. Force Master read after write</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="198.0469" x="16" y="524.5361">2. Track write timestamp, route smart</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="209.4375" x="16" y="538.335">3. Accept staleness for non-critical data</text><path d="M173,555.8779 L173,578.8779 L315,578.8779 L315,565.8779 L305,555.8779 L173,555.8779 " fill="#FFA500" style="stroke:#000000;stroke-width:1.0;"/><path d="M305,555.8779 L305,565.8779 L315,565.8779 L305,555.8779 " fill="#FFA500" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="121.5293" x="179" y="572.1338">"Where's my update?!"</text><!--SRC=[RLF1ajem3BtxAvHm03g5cTtUcA4TkeLBsS9ksDbBBo8Hu26nCxR2bdvz5HjA3amEaUINfwSd9-43LGHrYTeeVzIcHeSLR34_xfrjJF5aI-kWjvYtJmTHq0wRaXVMy2yKXfdJMDu_p_HVWeT7fLXpIV1AM8pUdMQ2h2uripPx6C7c83dZ1G1hPxSbLKfXpY8WVVFaKa0FZGHAUh3ETOs68HNed_DlCmZlx6Kv3BYwpLI1Z5lq1EapUhvGL27id6KbdYWS-JPIQZg